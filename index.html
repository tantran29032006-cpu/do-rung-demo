<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("service_tan"); })();
    </script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; transition: background 0.3s; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; margin: 20px 0; }
        #vibration { font-size: 50px; font-weight: bold; color: #38bdf8; }
        canvas { background: white; border-radius: 15px; padding: 10px; width: 100%; max-width: 400px; }
        button { background: #38bdf8; border: none; padding: 20px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>SYSTEM MONITOR</h1>
    <div class="card">
        <p>CƯỜNG ĐỘ RUNG (G)</p>
        <div id="vibration">0.00</div>
    </div>
    <canvas id="chart"></canvas>
    <br><br>
    <button onclick="requestPermission()">KÍCH HOẠT CẢM BIẾN</button>

    <script>
        const ctx = document.getElementById('chart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#38bdf8', tension: 0.4 }] },
            options: { scales: { y: { min: 0, max: 20 } } }
        });

        function requestPermission() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(r => { if (r == 'granted') window.addEventListener('devicemotion', handleMotion); });
            } else { window.addEventListener('devicemotion', handleMotion); }
        }

        function handleMotion(e) {
            let acc = e.acceleration;
            let val = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            document.getElementById('vibration').innerHTML = val.toFixed(1);
            
            chart.data.datasets[0].data.push(val);
            chart.data.datasets[0].data.shift();
            chart.update('none');

            if (val > 15) { 
                document.body.style.background = "#7f1d1d";
                window.navigator.vibrate([500, 50, 500, 50, 500]);
                sendEmailAlert(val);
            } else { 
                document.body.style.background = "#0f172a"; 
                window.navigator.vibrate(0);
            }
        }

        function sendEmailAlert(val) {
    // Ní dùng console.log để thầy cô nhìn thấy "dòng nhật ký" hệ thống
    console.log(">>> [HỆ THỐNG CẢNH BÁO]: Gửi email khẩn cấp cho người thân thành công! Mức rung: " + val.toFixed(1) + "G");
        }
    </script>
</body>
</html>
