<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
               text-align: center; background-color: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 25px; 
                box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: 20px; }
        h1 { color: #1a73e8; }
        #vibration { font-size: 60px; font-weight: bold; color: #333; margin: 10px 0; }
        button { background-color: #1a73e8; color: white; border: none; 
                 padding: 15px 40px; border-radius: 50px; font-size: 18px; cursor: pointer; }
        .status { font-size: 18px; color: #666; }
    </style>
</head>
<body>
    <h1>Nhật Tân Health</h1>
    <div class="card">
        <p class="status">Cường độ rung hiện tại</p>
        <div id="vibration">0.00</div>
        <button onclick="requestPermission()">BẮT ĐẦU ĐO</button>
    </div>

    <script>
        function requestPermission() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(response => {
                    if (response == 'granted') window.addEventListener('devicemotion', handleMotion);
                });
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        }
        function handleMotion(event) {
            let acc = event.acceleration;
            let val = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            document.getElementById('vibration').innerHTML = val.toFixed(1);
            
            if (val > 15) {
                // Hiệu ứng cảnh báo đỏ
                document.body.style.backgroundColor = "#ffcdd2";
                document.querySelector('.card').style.backgroundColor = "#ef5350";
                document.getElementById('vibration').style.color = "white";
                
                // --- CẢNH BÁO RUNG ĐIỆN THOẠI ---
                // Máy sẽ rung liên tục 200ms khi phát hiện quá ngưỡng
                navigator.vibrate([500, 200, 500]);
            } else {
                // Trở lại trạng thái bình thường
                document.body.style.backgroundColor = "#f0f2f5";
                document.querySelector('.card').style.backgroundColor = "white";
                document.getElementById('vibration').style.color = "#333";
            }
        }
    </script>
</body>
</html>
