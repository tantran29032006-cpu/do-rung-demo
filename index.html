<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 10px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; margin: 10px 0; }
        #vibration { font-size: 40px; font-weight: bold; color: #38bdf8; }
        canvas { background: white; border-radius: 10px; margin-top: 10px; }
        button { background: #38bdf8; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <h1>SYSTEM MONITOR</h1>
    <div class="card">
        <p>CƯỜNG ĐỘ RUNG</p>
        <div id="vibration">0.00</div>
    </div>
    <canvas id="chart"></canvas>
    <button onclick="requestPermission()">KÍCH HOẠT CẢM BIẾN</button>

    <script>
        const ctx = document.getElementById('chart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0), borderColor: '#38bdf8', tension: 0.4 }] },
            options: { scales: { y: { min: 0, max: 20 } } }
        });

        function requestPermission() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(r => { if (r == 'granted') window.addEventListener('devicemotion', handleMotion); });
            } else { window.addEventListener('devicemotion', handleMotion); }
        }

        function handleMotion(e) {
            let val = Math.sqrt(e.acceleration.x**2 + e.acceleration.y**2 + e.acceleration.z**2);
            document.getElementById('vibration').innerHTML = val.toFixed(1);
            chart.data.datasets[0].data.push(val);
            chart.data.datasets[0].data.shift();
            chart.update('none');
            if (val > 15) { 
                document.body.style.background = "#7f1d1d";
                if (val > 15) { 
    document.body.style.background = "#7f1d1d";
    
    // RUNG MẠNH VÀ LIÊN TỤC
    // Cứ 500ms rung, 50ms nghỉ, lặp lại cho đến khi ní ngừng lắc
    window.navigator.vibrate([500, 50, 500, 50, 500]); 
    
} else { 
    document.body.style.background = "#0f172a"; 
    // Dừng rung ngay khi không còn rung quá ngưỡng
    window.navigator.vibrate(0); 
}
            } else { document.body.style.background = "#0f172a"; }
        }
    </script>
</body>
</html>
