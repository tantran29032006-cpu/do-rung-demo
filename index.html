<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){ emailjs.init("nhattan"); })();
    </script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; margin: 20px 0; }
        #vibration { font-size: 50px; font-weight: bold; color: #38bdf8; }
        button { background: #38bdf8; border: none; padding: 20px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 18px; }
    </style>
</head>
<body>
    <h1>SYSTEM MONITOR</h1>
    <div class="card">
        <p>CƯỜNG ĐỘ RUNG (G)</p>
        <div id="vibration">0.00</div>
    </div>
    <button onclick="requestPermission()">KÍCH HOẠT CẢM BIẾN</button>

    <script>
        let isSending = false;

        function requestPermission() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(r => { if (r == 'granted') window.addEventListener('devicemotion', handleMotion); });
            } else { window.addEventListener('devicemotion', handleMotion); }
        }

        function handleMotion(e) {
            let val = Math.sqrt(e.acceleration.x**2 + e.acceleration.y**2 + e.acceleration.z**2);
            document.getElementById('vibration').innerHTML = val.toFixed(1);

            if (val > 15) { 
                document.body.style.background = "#7f1d1d";
                window.navigator.vibrate([500, 50, 500]);
                
                if (!isSending) {
                    isSending = true;
                    // NÍ THAY CHỮ "template_..." DƯỚI ĐÂY BẰNG MÃ TRONG HÌNH CỦA NÍ
                    emailjs.send("service_tan", "CẢNH BÁO RUNG ĐỘNG! Nhật Tân đang gặp nguy hiểm hãy liên hệ gấp", {
                        vibration_level: val.toFixed(1)
                    }).then(() => {
                        alert("Cảnh báo đã gửi về email!");
                        setTimeout(() => { isSending = false; }, 10000);
                    });
                }
            } else { 
                document.body.style.background = "#0f172a"; 
            }
        }
    </script>
</body>
</html>
